name: Daily NYC 311 Report

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Run daily pipeline
        env:
          NYC311_APP_TOKEN: ${{ secrets.NYC311_APP_TOKEN }}
          NYC311_SECRET_TOKEN: ${{ secrets.NYC311_SECRET_TOKEN }}
          NYC311_API_ENDPOINT: https://data.cityofnewyork.us/api/v3/views/erm2-nwe9/query.json
        run: python -m src.run_daily_pipeline

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw data/processed reports README.md
          git diff --cached --quiet || git commit -m "chore: update daily NYC 311 artifacts"
          git push
